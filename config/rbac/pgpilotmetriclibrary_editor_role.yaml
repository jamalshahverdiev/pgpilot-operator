# This rule is not used by the project pgpilot-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the pgpilot.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: pgpilot-operator
    app.kubernetes.io/managed-by: kustomize
  name: pgpilotmetriclibrary-editor-role
rules:
- apiGroups:
  - pgpilot.io
  resources:
  - pgpilotmetriclibraries
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - pgpilot.io
  resources:
  - pgpilotmetriclibraries/status
  verbs:
  - get
