# This rule is not used by the project pgpilot-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to pgpilot.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: pgpilot-operator
    app.kubernetes.io/managed-by: kustomize
  name: pgpilotmetriclibrary-viewer-role
rules:
- apiGroups:
  - pgpilot.io
  resources:
  - pgpilotmetriclibraries
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - pgpilot.io
  resources:
  - pgpilotmetriclibraries/status
  verbs:
  - get
