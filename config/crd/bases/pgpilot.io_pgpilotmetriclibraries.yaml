---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: pgpilotmetriclibraries.pgpilot.io
spec:
  group: pgpilot.io
  names:
    kind: PgpilotMetricLibrary
    listKind: PgpilotMetricLibraryList
    plural: pgpilotmetriclibraries
    shortNames:
    - pml
    singular: pgpilotmetriclibrary
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Number of metric definitions
      jsonPath: .spec.metrics[*].name
      name: Metrics
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          PgpilotMetricLibrary is a namespace-scoped, reusable collection of
          pgwatch-compatible metric definitions. A PgpilotMonitor references one
          or more libraries to compose its effective metrics.yaml without having
          to inline every custom SQL.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of PgpilotMetricLibrary
            properties:
              metrics:
                description: metrics is the list of metric definitions provided by
                  this library.
                items:
                  description: |-
                    MetricDefinition describes one pgwatch SQL metric. It is the unit shared
                    between PgpilotMetricLibrary (reusable sets) and PgpilotMonitor.spec.metrics.custom
                    (inline one-offs). The operator merges these with the pgwatch built-in
                    preset selected by the user and materialises a metrics.yaml for pgwatch.
                  properties:
                    description:
                      description: description is a free-form human-readable hint.
                        Not used by pgwatch.
                      type: string
                    gauges:
                      description: |-
                        gauges lists the result columns treated as gauges (vs counters).
                        Use ["*"] to mark every non-tag column as a gauge — this matches
                        how pgwatch built-in metrics are written.
                      items:
                        type: string
                      type: array
                    interval:
                      description: |-
                        interval is the collection period (e.g. "60s", "5m"). If omitted,
                        pgwatch defaults apply.
                      type: string
                    isInstanceLevel:
                      description: isInstanceLevel marks the metric as instance-wide
                        (not database-scoped).
                      type: boolean
                    masterOnly:
                      description: masterOnly restricts collection to primary PostgreSQL
                        instances.
                      type: boolean
                    name:
                      description: |-
                        name is the pgwatch metric name. Used as the key in metrics.yaml and
                        as the series name when shipped to Prometheus / gRPC sinks.
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-z_][a-z0-9_]*$
                      type: string
                    sqls:
                      additionalProperties:
                        type: string
                      description: |-
                        sqls maps PostgreSQL major version (as a string, e.g. "13", "14")
                        to the SQL statement pgwatch will execute on that version. The key
                        "*" (or the lowest-version entry) acts as a fallback — exact semantics
                        match pgwatch's own metrics.yaml.
                      minProperties: 1
                      type: object
                    standbyOnly:
                      description: standbyOnly restricts collection to standby (replica)
                        instances.
                      type: boolean
                    statementTimeoutSeconds:
                      description: |-
                        statementTimeoutSeconds limits execution time for the SQL. 0 means
                        no explicit timeout. pgwatch enforces this per-query.
                      format: int32
                      minimum: 0
                      type: integer
                  required:
                  - name
                  - sqls
                  type: object
                minItems: 1
                type: array
            required:
            - metrics
            type: object
          status:
            description: status defines the observed state of PgpilotMetricLibrary
            properties:
              conditions:
                description: |-
                  conditions reflects the current state of the library.
                  Typical types: "Valid" (syntactic validation of SQL/markers passes).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  observedGeneration is the .metadata.generation the controller last
                  reconciled.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
