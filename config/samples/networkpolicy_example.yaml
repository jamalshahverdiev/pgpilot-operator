## Example NetworkPolicy for pgpilot-operator.
##
## This allows:
## 1. Operator manager pod → target PostgreSQL databases (egress on port 5432)
## 2. pgwatch monitor pods → target PostgreSQL databases (egress on port 5432)
## 3. Prometheus/vmagent → pgwatch monitor pods (ingress on port 9187)
## 4. pgwatch monitor pods → Kubernetes API (egress on port 443)
##
## Adapt the namespace selectors and pod selectors to your environment.

---
# Allow pgwatch monitor pods to reach PostgreSQL and expose metrics
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pgpilot-monitor-policy
  namespace: team-users
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: pgpilot-monitor
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow Prometheus / vmagent scrape on metrics port
    - ports:
        - protocol: TCP
          port: 9187
  egress:
    # Allow connection to PostgreSQL
    - ports:
        - protocol: TCP
          port: 5432
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# Allow operator manager to reach Kubernetes API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pgpilot-operator-policy
  namespace: pgpilot-operator-system
spec:
  podSelector:
    matchLabels:
      control-plane: controller-manager
  policyTypes:
    - Egress
  egress:
    # Kubernetes API server
    - ports:
        - protocol: TCP
          port: 443
    # DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
